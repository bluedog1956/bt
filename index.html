<!DOCTYPE html>
<html>
<head>
    <title>BT Controller</title>
    <style>
        body { font-family: sans-serif; display: flex; gap: 20px; padding: 20px; }
        .card { border: 2px solid #333; padding: 15px; border-radius: 10px; width: 150px; text-align: center; }
        .status { font-size: 0.8em; margin: 10px 0; font-weight: bold; }
        .on { color: green; } .off { color: red; }
    </style>
</head>
<body>

    <script>
        // REPLACE THESE WITH YOUR ACTUAL DEVICE NAMES
        const MY_DEVICES = ["B8", "F9", "OpenRun by Shokz"];
        let deviceObjects = {};

        async function init() {
            // This triggers the picker ONCE to grant the website permission
            // After this, you can just use Connect/Disconnect
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['battery_service'] 
                });
                alert(`Authorized: ${device.name}. Refresh to see it in a slot.`);
            } catch (e) { console.log("User cancelled or failed"); }
        }

        async function toggle(name, index) {
            const statusEl = document.getElementById(`status-${index}`);
            
            // Look for the device in previously permitted list
            if (!deviceObjects[name]) {
                const paired = await navigator.bluetooth.getDevices();
                deviceObjects[name] = paired.find(d => d.name === name);
            }

            const device = deviceObjects[name];
            if (!device) return alert(`"${name}" not authorized. Use 'Initialize' first.`);

            try {
                if (device.gatt.connected) {
                    await device.gatt.disconnect();
                    statusEl.innerText = "OFFLINE";
                    statusEl.className = "status off";
                } else {
                    statusEl.innerText = "CONNECTING...";
                    await device.gatt.connect();
                    statusEl.innerText = "CONNECTED";
                    statusEl.className = "status on";
                }
            } catch (err) {
                statusEl.innerText = "ERROR";
                console.error(err);
            }
        }
    </script>

    <div style="position: absolute; top: 10px; right: 10px;">
        <button onclick="init()">Initialize New Device</button>
    </div>

    <!-- Generate 3 slots based on names above -->
    <script>
        MY_DEVICES.forEach((name, i) => {
            document.write(`
                <div class="card">
                    <strong>${name}</strong>
                    <div id="status-${i}" class="status off">OFFLINE</div>
                    <button onclick="toggle('${name}', ${i})">Connect / Disconnect</button>
                </div>
            `);
        });
    </script>

</body>
</html>
